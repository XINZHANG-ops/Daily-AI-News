<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily AI News Archive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e4;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid #0f3460;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }
        
        .archive-list {
            display: grid;
            gap: 15px;
        }
        
        .archive-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px 25px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .archive-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
        
        .date-link {
            color: #e94560;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .date-link:hover {
            color: #ff6b6b;
        }
        
        .date-link::before {
            content: '📰';
            font-size: 1.4rem;
        }
        
        .arrow {
            color: #666;
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }
        
        .archive-item:hover .arrow {
            transform: translateX(5px);
            color: #e94560;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        footer {
            text-align: center;
            padding: 40px 0;
            color: #666;
            font-size: 0.9rem;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .total-count {
            background: linear-gradient(135deg, #e94560 0%, #533483 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Daily AI News Archive</h1>
            <p class="subtitle">Your daily digest of artificial intelligence news</p>
        </header>
        
        <main>
            <!-- ARCHIVE_ITEMS_START -->
        <div class="archive-list">
        <div class="archive-item">
            <a href="pages/2026-03-15.html" class="date-link">
                March 15, 2026
            </a>
            <span class="arrow">→</span>
        </div>
    </div>
    <p style="text-align: center; margin-top: 30px; color: #888;">Total archives: <span class="total-count">1</span></p>
            <!-- ARCHIVE_ITEMS_END -->
        </main>
        
        <footer>
            <p>Generated automatically • <span id="year"></span></p>
        </footer>
    </div>
    
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>

    </div>

        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
